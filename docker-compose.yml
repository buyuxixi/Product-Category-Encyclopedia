services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-category_encyclopedia}
      MYSQL_USER: ${MYSQL_USER:-encyclopedia}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-encyclopedia_dev}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --ngram-token-size=2
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://encyclopedia:encyclopedia_dev@mysql:3306/category_encyclopedia?charset=utf8mb4}
      AUTH_MODE: ${AUTH_MODE:-local}
      AUTH_USERS_JSON: ${AUTH_USERS_JSON:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:4173,http://127.0.0.1:4173}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-12}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-encyclopedia_session}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_REDIRECT_URI: ${FEISHU_REDIRECT_URI:-}
      FEISHU_SCOPE: ${FEISHU_SCOPE:-}
      FEISHU_FRONTEND_URL: ${FEISHU_FRONTEND_URL:-http://localhost:4173/}
      FEISHU_DEFAULT_ROLE: ${FEISHU_DEFAULT_ROLE:-researcher}
      FEISHU_ROLE_MAP_JSON: ${FEISHU_ROLE_MAP_JSON:-}
      FEISHU_ALLOWED_OPEN_IDS: ${FEISHU_ALLOWED_OPEN_IDS:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://llm-4ky3t9l8il29a1dv.cn-beijing.maas.aliyuncs.com/compatible-mode/v1}
      LLM_MODEL: ${LLM_MODEL:-qwen-plus}
      CRAWLER_ENABLED: ${CRAWLER_ENABLED:-false}
      CRAWLER_SCRIPTS_DIR: ${CRAWLER_SCRIPTS_DIR:-}
      CRAWLER_API_BASE: ${CRAWLER_API_BASE:-http://backend:8000/api/v1}
      CRAWLER_PASSWORD_FILE: ${CRAWLER_PASSWORD_FILE:-}
      CRAWLER_HTTP_PROXY: ${CRAWLER_HTTP_PROXY:-}
      CRAWLER_HTTPS_PROXY: ${CRAWLER_HTTPS_PROXY:-}
    ports:
      # 本机 8000 已被其他服务占用，宿主机映射到 8010；容器内仍为 8000
      - "8010:8000"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 12

  frontend:
    build: ./frontend
    ports:
      - "4173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
